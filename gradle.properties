# Project-wide Gradle settings
# http://www.gradle.org/docs/current/userguide/build_environment.html

# JVM settings for the Gradle Daemon (Memory & Encoding)
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Modern Android development standards
android.useAndroidX=true
kotlin.code.style=official

# Build optimizations
# Reduces R class size by avoiding resource inheritance from dependencies
android.nonTransitiveRClass=true
# Ensures consistent dependency versions across the project
android.dependency.useConstraints=true